name: PR preview build

# Publishes an Expo preview update every time a PR is opened or updated.
# A comment with a QR-code link is posted on the PR; scan it with Expo Go
# (or an internal dev build) to load the PR's JS bundle.
#
# Required secrets:
#   EXPO_TOKEN — personal access token with "Publish updates" permission
#                  (https://expo.dev → Account → Access Tokens).
#
# Notes:
#   - This runs `eas update`, which only rebundles JS and ships it through
#     Expo's CDN. It does NOT compile native code. Native-config changes
#     (app.json plugins, new expo-* modules) need a full `eas build`; the
#     linked doc in apps/mobile/README.md explains when to bump that.
#   - Web deploys are handled separately via `wrangler deploy` in the
#     production workflow; this file only touches the JS bundle served to
#     the iOS / Android app.

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel in-flight runs for the same PR when new commits land so the
# comment always reflects the latest head.
concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Publish EAS preview update
    runs-on: ubuntu-latest
    # Skip when the PR is from a fork — we'd have no access to secrets.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: npm

      - name: Set up Expo / EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build SQLite vocab database
        run: node scripts/generate-vocab-db.mjs

      - name: Publish preview update
        id: publish
        uses: expo/expo-github-action/preview@v8
        with:
          command: eas update --auto --branch pr-${{ github.event.pull_request.number }} --non-interactive
          working-directory: apps/mobile
          # The action posts (or updates) a single PR comment with a QR
          # code + links to the iOS / Android previews. Defaults are fine.
          comment: true
          qr-target: 'expo-go'
