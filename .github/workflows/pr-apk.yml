name: PR Android APK

# Builds a release APK for every pull request with Gradle directly (no EAS).
# The APK is attached as a GitHub Actions artifact — download from the
# "Actions" tab of the PR.
#
# Signing: `expo prebuild` generates an android/ directory where the release
# variant inherits the debug keystore unless a production signing config is
# wired up. That's fine for PR previews — every reviewer's device trusts
# the standard Android debug keystore so the APK installs like any other.
# Production builds should switch to a proper upload keystore.
#
# Runtime: ~8-15 minutes depending on cache hit rate.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-apk-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    # Skip on forked PRs — node_modules from a fork with native deps is a
    # supply-chain risk we don't want to auto-execute.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties', 'apps/mobile/package.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        # The root postinstall (scripts/copy-dict.mjs) populates dict files
        # into apps/mobile/{public,assets}/dict and packages/core/assets/dict
        # so the Metro bundler can resolve the kuromoji require()s.
        run: npm ci --legacy-peer-deps

      - name: Generate audio assets
        # correct.wav / incorrect.wav are referenced via require() from
        # useAudioFeedback.native.ts. We synthesise them deterministically
        # at build time rather than committing binary blobs.
        run: node scripts/generate-feedback-wavs.mjs

      - name: Build SQLite vocab database
        # vocab.db is a runtime asset the app bundles; regenerate so every
        # APK matches the JLPT source files on this PR's HEAD.
        run: node scripts/generate-vocab-db.mjs

      - name: Prebuild Android project
        # Generates android/ from the managed config. --clean discards any
        # cached generator output that might predate this PR.
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean --no-install

      - name: Assemble release APK
        working-directory: apps/mobile/android
        # ORG_GRADLE_PROJECT_javaToolchainAutoDetect: false stops Gradle
        # from auto-downloading a JDK at build time (the runner is offline
        # for non-Maven traffic). The JDK 17 from setup-java is detected
        # automatically via JAVA_HOME.
        env:
          ORG_GRADLE_PROJECT_javaToolchainAutoDetect: 'false'
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Locate APK
        id: locate
        working-directory: apps/mobile
        run: |
          apk=$(find android/app/build/outputs/apk/release -name '*.apk' | head -n 1)
          if [ -z "$apk" ]; then
            echo "No APK produced" >&2
            exit 1
          fi
          echo "apk-path=apps/mobile/$apk" >> "$GITHUB_OUTPUT"
          # Rename with the PR number so contributors can tell builds apart.
          dest="japanese-learning-pr${{ github.event.pull_request.number }}-${GITHUB_SHA::7}.apk"
          cp "$apk" "$dest"
          echo "apk-named=apps/mobile/$dest" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: japanese-learning-pr${{ github.event.pull_request.number }}-${{ github.sha }}
          path: ${{ steps.locate.outputs.apk-named }}
          retention-days: 14
          if-no-files-found: error

      - name: Comment on PR with artifact link
        if: success()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: android-apk
          message: |
            ### Android preview APK ready

            Download from the [workflow run artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts) (signed with the Android debug keystore, installs on any device via `adb install` or a file manager).

            Commit: `${{ github.event.pull_request.head.sha }}`
            Artifact: `japanese-learning-pr${{ github.event.pull_request.number }}-${{ github.sha }}`

            > GitHub only exposes artifact downloads to signed-in users with read access to the repo, so the link won't work for external reviewers. For public previews, wire the APK into a `release` + `softprops/action-gh-release` upload instead.
