name: PR Android APK

# Builds a release APK for every pull request with Gradle directly (no
# EAS) and publishes it to a per-PR GitHub Pre-release. The PR comment
# links straight to the .apk file — one click to download, no zip step.
#
# A pre-release is created (or updated) per PR with tag `pr-<NUMBER>`.
# When the PR is closed/merged, the release stays around as a build
# archive; clean it up manually if it gets noisy.
#
# Signing: `expo prebuild` generates an android/ where the release
# variant inherits the debug keystore. That's fine for PR previews —
# every device trusts the debug keystore so the APK installs cleanly.
# Production should switch to a real upload keystore.
#
# Runtime: ~8-15 minutes depending on cache hit rate.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: pr-apk-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    # Skip on close events (the cleanup job handles those) and on forked
    # PRs (running native install scripts from a fork is a supply-chain
    # risk we don't want to auto-execute).
    if: ${{ github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: write       # required to create / update releases
      pull-requests: write  # required to comment on the PR

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties', 'apps/mobile/package.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        # Root postinstall (scripts/copy-dict.mjs) populates dict files
        # into apps/mobile/{public,assets}/dict and packages/core/assets/dict
        # so Metro can resolve the kuromoji require()s.
        run: npm ci --legacy-peer-deps

      - name: Generate audio assets
        # correct.wav / incorrect.wav are referenced via require() from
        # useAudioFeedback.native.ts. Synthesised deterministically.
        run: node scripts/generate-feedback-wavs.mjs

      - name: Build SQLite vocab database
        # vocab.db lands in apps/mobile/{public,assets}/ AND packages/core/
        # assets/ — the last is what the native loader's require() points at.
        run: node scripts/generate-vocab-db.mjs

      - name: Prebuild Android project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean --no-install

      - name: Assemble release APK
        working-directory: apps/mobile/android
        env:
          ORG_GRADLE_PROJECT_javaToolchainAutoDetect: 'false'
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        id: locate
        working-directory: apps/mobile
        run: |
          src=$(find android/app/build/outputs/apk/release -name '*.apk' | head -n 1)
          if [ -z "$src" ]; then echo "No APK produced" >&2; exit 1; fi
          name="japanese-learning-pr${{ github.event.pull_request.number }}-${GITHUB_SHA::7}.apk"
          cp "$src" "$name"
          echo "apk-name=$name" >> "$GITHUB_OUTPUT"
          echo "apk-path=apps/mobile/$name" >> "$GITHUB_OUTPUT"

      - name: Upload to PR pre-release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          # Per-PR release. tag_name is stable across re-runs so updates
          # replace the previous APK rather than spawning new releases.
          tag_name: pr-${{ github.event.pull_request.number }}
          name: 'PR #${{ github.event.pull_request.number }} preview build'
          body: |
            Automated preview build of PR
            [#${{ github.event.pull_request.number }}](${{ github.event.pull_request.html_url }}).

            Latest commit: `${{ github.event.pull_request.head.sha }}`
            Built: `${{ github.run_id }}`

            APK signed with the Android debug keystore. Install via
            `adb install` or by tapping the file on the device.
          prerelease: true
          # Make_latest=false keeps this release out of /releases/latest.
          make_latest: 'false'
          # Replace any prior asset with the same name on a re-run.
          fail_on_unmatched_files: true
          files: ${{ steps.locate.outputs.apk-path }}

      - name: Comment on PR with download link
        if: success()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: android-apk
          message: |
            ### Android preview APK

            **[Download .apk (one click)](${{ github.server_url }}/${{ github.repository }}/releases/download/pr-${{ github.event.pull_request.number }}/${{ steps.locate.outputs.apk-name }})**

            Commit: `${{ github.event.pull_request.head.sha }}`
            Release: [pr-${{ github.event.pull_request.number }}](${{ github.server_url }}/${{ github.repository }}/releases/tag/pr-${{ github.event.pull_request.number }})

            Signed with the Android debug keystore — install via `adb install` or tap the file on the device.

  cleanup:
    name: Delete pre-release on PR close
    runs-on: ubuntu-latest
    if: ${{ github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: write
    steps:
      - name: Delete release + tag
        run: |
          tag="pr-${{ github.event.pull_request.number }}"
          gh release delete "$tag" --repo "${{ github.repository }}" --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
